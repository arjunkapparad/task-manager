<!DOCTYPE html>
<html>

<head>
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
}

.container {
  width: 600px;
  margin: auto;
  text-align: center;
}

input, button, select {
  margin: 5px;
  padding: 8px;
}

ul {
  padding: 0;
}

li {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task-text {
  flex: 1;
  text-align: left;
}

.task-actions button {
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1 style="color: brown;">Task Manager</h1>

<input id="taskInput" placeholder="Enter task">
<input type="date" id="taskDate">

<select id="priority">
  <option value="Low">Low</option>
  <option value="Medium">Medium</option>
  <option value="High">High</option>
</select>

<button onclick="addTask()">Add Task</button>

<br>

<input id="searchInput" placeholder="Search task..." onkeyup="loadTasks()">

<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('completed')">Completed</button>
<button onclick="setFilter('pending')">Pending</button>

<ul id="taskList"></ul>

</div>

<script>

let currentFilter = "all";

// ✅ ADD THIS LINE (central API)
const API = "https://task-manager-g9qc.onrender.com";

// ADD TASK
async function addTask() {
  let task = document.getElementById("taskInput").value;
  let date = document.getElementById("taskDate").value;
  let priority = document.getElementById("priority").value;

  if (task === "" || date === "") {
    alert("Enter task and date");
    return;
  }

  await fetch(`${API}/tasks`, {   // ✅ FIXED
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: task,
      date: date,
      completed: false,
      priority: priority
    })
  });

  loadTasks();

  document.getElementById("taskInput").value = "";
  document.getElementById("taskDate").value = "";
}

// FILTER
function setFilter(filter) {
  currentFilter = filter;
  loadTasks();
}

// LOAD TASKS
async function loadTasks() {
  let res = await fetch(`${API}/tasks`);   // ✅ FIXED
  let data = await res.json();

  data.forEach(task => {
    if (!task.priority) task.priority = "Low";
  });

  data.sort((a, b) => {
    const order = { High: 3, Medium: 2, Low: 1 };
    return order[b.priority] - order[a.priority];
  });

  let search = document.getElementById("searchInput").value.toLowerCase();
  let list = document.getElementById("taskList");
  list.innerHTML = "";

  for (let i = 0; i < data.length; i++) {

    if (!data[i].name.toLowerCase().includes(search)) continue;
    if (currentFilter === "completed" && !data[i].completed) continue;
    if (currentFilter === "pending" && data[i].completed) continue;

    let li = document.createElement("li");

    li.style.borderLeft = data[i].completed
      ? "5px solid green"
      : "5px solid red";

    let dateObj = new Date(data[i].date);
    let day = dateObj.toLocaleDateString('en-US', { weekday: 'long' });

    let status = data[i].completed
      ? "<span style='color:green'>✔ Done</span>"
      : "<span style='color:red'>✖ Pending</span>";

    let priorityColor = {
      High: "red",
      Medium: "orange",
      Low: "green"
    };

    let priorityText = `<span style="color:${priorityColor[data[i].priority]}">
      [${data[i].priority}]
    </span>`;

    let textDiv = document.createElement("div");
    textDiv.className = "task-text";
    textDiv.innerHTML =
      `${data[i].name} - ${data[i].date} (${day}) - ${status} ${priorityText}`;

    let actionDiv = document.createElement("div");

    // DELETE
    let delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.onclick = async function() {
      await fetch(`${API}/tasks/${data[i]._id}`, {   // ✅ FIXED
        method: "DELETE"
      });
      loadTasks();
    };

    // EDIT
    let editBtn = document.createElement("button");
    editBtn.textContent = "Edit";
    editBtn.onclick = async function() {
      let newTask = prompt("Edit task:", data[i].name);
      let newDate = prompt("Edit date:", data[i].date);

      if (newTask && newDate) {
        await fetch(`${API}/tasks/${data[i]._id}`, {   // ✅ FIXED
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: newTask,
            date: newDate,
            completed: data[i].completed,
            priority: data[i].priority
          })
        });
        loadTasks();
      }
    };

    // COMPLETE
    let completeBtn = document.createElement("button");
    completeBtn.textContent = data[i].completed ? "Undo" : "Complete";
    completeBtn.onclick = async function() {
      await fetch(`${API}/tasks/${data[i]._id}`, {   // ✅ FIXED
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: data[i].name,
          date: data[i].date,
          completed: !data[i].completed,
          priority: data[i].priority
        })
      });
      loadTasks();
    };

    actionDiv.appendChild(delBtn);
    actionDiv.appendChild(editBtn);
    actionDiv.appendChild(completeBtn);

    li.appendChild(textDiv);
    li.appendChild(actionDiv);

    list.appendChild(li);
  }
}

loadTasks();

</script>

</body>
</html>
