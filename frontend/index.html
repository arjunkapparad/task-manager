<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
}

.container {
  width: 600px;
  margin: auto;
  text-align: center;
}

input, button, select {
  margin: 5px;
  padding: 8px;
}

ul {
  padding: 0;
}

li {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task-text {
  flex: 1;
  text-align: left;
}

.task-actions button {
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1 style="color: brown;">Task Manager</h1>

<input id="taskInput" placeholder="Enter task">
<input type="date" id="taskDate">

<select id="priority">
  <option value="Low">Low</option>
  <option value="Medium">Medium</option>
  <option value="High">High</option>
</select>

<button onclick="addTask()">Add Task</button>

<br>

<input id="searchInput" placeholder="Search task..." onkeyup="loadTasks()">

<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('completed')">Completed</button>
<button onclick="setFilter('pending')">Pending</button>

<ul id="taskList"></ul>

</div>

<script>

let currentFilter = "all";
const API = "https://task-manager-g9qc.onrender.com";

/* ================= ADD TASK ================= */
async function addTask() {
  const task = document.getElementById("taskInput").value.trim();
  const date = document.getElementById("taskDate").value;
  const priority = document.getElementById("priority").value;

  if (!task || !date) {
    alert("Enter task and date");
    return;
  }

  try {
    await fetch(`${API}/tasks`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: task,
        date,
        completed: false,
        priority
      })
    });

    document.getElementById("taskInput").value = "";
    document.getElementById("taskDate").value = "";

    loadTasks();

  } catch (err) {
    console.log(err);
    alert("Error adding task");
  }
}

/* ================= FILTER ================= */
function setFilter(filter) {
  currentFilter = filter;
  loadTasks();
}

/* ================= LOAD TASKS ================= */
async function loadTasks() {
  try {
    const res = await fetch(`${API}/tasks`);
    const data = await res.json();

    const search = document.getElementById("searchInput").value.toLowerCase();
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    const priorityOrder = { High: 3, Medium: 2, Low: 1 };

    data.sort((a, b) => priorityOrder[b.priority] - priorityOrder[a.priority]);

    data.forEach(task => {

      if (!task.name.toLowerCase().includes(search)) return;
      if (currentFilter === "completed" && !task.completed) return;
      if (currentFilter === "pending" && task.completed) return;

      const li = document.createElement("li");

      li.style.borderLeft = task.completed
        ? "5px solid green"
        : "5px solid red";

      const dateObj = new Date(task.date);
      const day = dateObj.toLocaleDateString('en-US', { weekday: 'long' });

      const status = task.completed
        ? "<span style='color:green'>✔ Done</span>"
        : "<span style='color:red'>✖ Pending</span>";

      const priorityColor = {
        High: "red",
        Medium: "orange",
        Low: "green"
      };

      const textDiv = document.createElement("div");
      textDiv.className = "task-text";
      textDiv.innerHTML = `
        ${task.name} - ${task.date} (${day}) - 
        ${status} 
        <span style="color:${priorityColor[task.priority]}">
          [${task.priority}]
        </span>
      `;

      const actionDiv = document.createElement("div");

      /* DELETE */
      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";
      delBtn.onclick = async () => {
        await fetch(`${API}/tasks/${task._id}`, { method: "DELETE" });
        loadTasks();
      };

      /* EDIT */
      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";
      editBtn.onclick = async () => {
        const newTask = prompt("Edit task:", task.name);
        const newDate = prompt("Edit date:", task.date);

        if (newTask && newDate) {
          await fetch(`${API}/tasks/${task._id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: newTask,
              date: newDate,
              completed: task.completed,
              priority: task.priority
            })
          });
          loadTasks();
        }
      };

      /* COMPLETE */
      const completeBtn = document.createElement("button");
      completeBtn.textContent = task.completed ? "Undo" : "Complete";
      completeBtn.onclick = async () => {
        await fetch(`${API}/tasks/${task._id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: task.name,
            date: task.date,
            completed: !task.completed,
            priority: task.priority
          })
        });
        loadTasks();
      };

      actionDiv.append(delBtn, editBtn, completeBtn);

      li.append(textDiv, actionDiv);
      list.appendChild(li);
    });

  } catch (err) {
    console.log(err);
    alert("Error loading tasks");
  }
}

loadTasks();

</script>

</body>
