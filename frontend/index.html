<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f8fafc;
  color: #0f172a;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 30px 15px;
}

h1 {
  margin-bottom: 20px;
}

/* layout rows */
.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

/* inputs */
input, select {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* buttons */
button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}

button:hover {
  opacity: 0.85;
}

/* list */
ul {
  padding: 0;
}

li {
  background: white;
  color: #0f172a;
  margin: 12px 0;
  padding: 15px;
  border-radius: 10px;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid #e2e8f0;
}

.task-text {
  font-size: 14px;
}

/* actions */
.task-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* button colors */
.task-actions button:nth-child(1) {
  background: #ef4444;
  color: white;
}

.task-actions button:nth-child(2) {
  background: #3b82f6;
  color: white;
}

.task-actions button:nth-child(3) {
  background: #22c55e;
  color: white;
}

/* stats */
#stats {
  margin-top: 10px;
  font-size: 14px;
  color: #64748b;
}

/* mobile */
@media (max-width: 600px) {
  .container {
    width: 95%;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<!-- 🔥 ADD TASK SECTION -->
<div class="controls">
  <input id="taskInput" placeholder="Enter task">
  <input type="date" id="taskDate">
  <select id="priority">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>
  <button onclick="addTask()" style="background:#22c55e;color:white;">Add</button>
</div>

<!-- 🔥 SEARCH + FILTER -->
<div class="controls">
  <input id="searchInput" placeholder="Search..." onkeyup="loadTasks()">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('completed')">Done</button>
  <button onclick="setFilter('pending')">Pending</button>
</div>

<h3 id="stats"></h3>

<ul id="taskList"></ul>

</div>

<script>

let currentFilter = "all";
const API = "https://task-manager-g9qc.onrender.com";

/* ================= ADD TASK ================= */
async function addTask() {
  const task = document.getElementById("taskInput").value.trim();
  const date = document.getElementById("taskDate").value;
  const priority = document.getElementById("priority").value;

  if (!task || !date) {
    alert("Enter task and date");
    return;
  }

  await fetch(`${API}/tasks`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: task,
      date,
      completed: false,
      priority
    })
  });

  document.getElementById("taskInput").value = "";
  document.getElementById("taskDate").value = "";

  loadTasks();
}

/* ================= FILTER ================= */
function setFilter(filter) {
  currentFilter = filter;
  loadTasks();
}

/* ================= LOAD TASKS ================= */
async function loadTasks() {
  const res = await fetch(`${API}/tasks`);
  const data = await res.json();

  const search = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  document.getElementById("stats").innerText =
    `Total: ${data.length} | Done: ${data.filter(t => t.completed).length}`;

  const priorityOrder = { High: 3, Medium: 2, Low: 1 };
  data.sort((a, b) => priorityOrder[b.priority] - priorityOrder[a.priority]);

  data.forEach(task => {

    if (!task.name.toLowerCase().includes(search)) return;
    if (currentFilter === "completed" && !task.completed) return;
    if (currentFilter === "pending" && task.completed) return;

    const li = document.createElement("li");

    const dateObj = new Date(task.date);
    const day = dateObj.toLocaleDateString('en-US', { weekday: 'long' });

    const status = task.completed
      ? "<span style='color:green'>✔ Done</span>"
      : "<span style='color:red'>✖ Pending</span>";

    const priorityColor = {
      High: "red",
      Medium: "orange",
      Low: "green"
    };

    const textDiv = document.createElement("div");
    textDiv.className = "task-text";
    textDiv.innerHTML = `
      ${task.name} - ${task.date} (${day}) - 
      ${status} 
      <span style="color:${priorityColor[task.priority]}">
        [${task.priority}]
      </span>
    `;

    const actionDiv = document.createElement("div");
    actionDiv.className = "task-actions";

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.onclick = async () => {
      await fetch(`${API}/tasks/${task._id}`, { method: "DELETE" });
      loadTasks();
    };

    const editBtn = document.createElement("button");
    editBtn.textContent = "Edit";
    editBtn.onclick = async () => {
      const newTask = prompt("Edit task:", task.name);
      const newDate = prompt("Edit date:", task.date);

      if (newTask && newDate) {
        await fetch(`${API}/tasks/${task._id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: newTask,
            date: newDate,
            completed: task.completed,
            priority: task.priority
          })
        });
        loadTasks();
      }
    };

    const completeBtn = document.createElement("button");
    completeBtn.textContent = task.completed ? "Undo" : "Complete";
    completeBtn.onclick = async () => {
      await fetch(`${API}/tasks/${task._id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: task.name,
          date: task.date,
          completed: !task.completed,
          priority: task.priority
        })
      });
      loadTasks();
    };

    actionDiv.append(delBtn, editBtn, completeBtn);
    li.append(textDiv, actionDiv);
    list.appendChild(li);
  });
}

loadTasks();

</script>

</body>
</html>
